<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting Machine</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="evm">
        <div class="party-names">
          <h2>Party 1</h2>
          <button value="Party 1" class="voteClass">Vote</button>
        </div>
        <div class="party-names">
          <h2>Party 2</h2>
          <button value="Party 2" class="voteClass">Vote</button>
        </div>
        <div class="party-names">
          <h2>Party 3</h2>
          <button value="Party 3" class="voteClass">Vote</button>
        </div>
        <div class="party-names">
          <h2 style="padding-left: 22px; padding-right:15px">NOTA</h2>
          <button value="NOTA" class="voteClass">Vote</button>
        </div>
      </div>

      <div class="vvpat">
        <div class="voteCount">
          <p id="count">0</p>
        </div>
        <div class="ballot">
          <button id ="ballot-btn">Ballot</button>
          <button id="cancel-btn">Cancel</button>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
